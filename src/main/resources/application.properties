# ========== SERVER CONFIGURATION ==========
server.port=8080
server.servlet.context-path=/api

# ========== DATABASE CONFIGURATION ==========
spring.datasource.url=jdbc:mysql://localhost:3306/javakart_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== HIBERNATE CONFIGURATION ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========== JWT CONFIGURATION ==========
jwt.secret=javakartSecretKeyForJWTAuthentication2024
jwt.expiration=86400000

# ========== FILE UPLOAD ==========
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== EMAIL CONFIGURATION (DUMMY - CHANGE FOR PRODUCTION) ==========
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=javakart.dummy@gmail.com
spring.mail.password=dummy_gmail_app_password_123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========== SMS CONFIGURATION (DUMMY - Twilio) ==========
# Get real credentials from: https://www.twilio.com/console
twilio.account.sid=AC00000000000000000000000000000000
twilio.auth.token=your_dummy_auth_token_123456
twilio.phone.number=+15005550006

# ========== RAZORPAY CONFIGURATION (DUMMY - TEST MODE) ==========
# Get real credentials from: https://dashboard.razorpay.com
razorpay.key.id=rzp_test_000000000000000
razorpay.key.secret=TEST_RAZORPAY_SECRET_KEY_DUMMY

# ========== APPLICATION SETTINGS ==========
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000
app.upload-dir=uploads/
app.default-page-size=20

# ========== LOGGING ==========
logging.level.com.javakart=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
logging.file.name=logs/javakart.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ========== CACHE CONFIGURATION ==========
spring.cache.type=simple
spring.cache.cache-names=products,categories,users

# ========== RATE LIMITING ==========
app.rate-limit.requests-per-minute=60

# ========== FEATURE TOGGLES ==========
app.features.email-notifications=true
app.features.sms-notifications=false
app.features.online-payments=true
app.features.cod-payments=true